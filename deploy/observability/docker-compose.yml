version: "3.8"

# ZBOT Observability Stack
# Loki (logs) + Promtail (shipper) + Prometheus (metrics) + Grafana (UI)
#
# Usage:
#   cd ~/Desktop/zbot/deploy/observability
#   docker compose up -d
#   open http://localhost:3000  (admin / zbot-grafana)

services:
  loki:
    image: grafana/loki:2.9.4
    container_name: zbot-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.4
    container_name: zbot-promtail
    volumes:
      - ./promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/log:/var/log:ro
      # Mount ZBOT log file if you redirect stdout:
      # - /tmp/zbot.log:/var/log/zbot.log:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: zbot-prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.3
    container_name: zbot-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: zbot-grafana
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
      - prometheus
    restart: unless-stopped

volumes:
  loki_data:
  prometheus_data:
  grafana_data:
