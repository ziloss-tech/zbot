# ZBOT Configuration
# Copy to config.yaml and customize. config.yaml is gitignored.
# Most settings can also be set via environment variables (ZBOT_*).

env: development         # development | production

# GCP project (optional — for GCP Secret Manager + Vertex AI embeddings)
gcp_project: ""

# Database (optional — enables persistent memory, audit log, workflows)
# Can also use ZBOT_DATABASE_URL env var for a full connection string.
db_host: "localhost"
db_name: "zbot"
db_user: "zbot"

# Workflow
worker_count: 3          # parallel workflow workers

# WebUI
gateway_port: 18790

# Workspace
workspace_dir: ./workspace  # agent's working directory for files

# Scraper
proxy_enabled: false
respect_robots_txt: true
domain_blocklist:
  - "linkedin.com"
  - "facebook.com"
